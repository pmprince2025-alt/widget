name: Generate Signing Keystore

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore widgetkit-release.keystore \
            -alias widgetkit \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass widgetkit2025 \
            -keypass widgetkit2025 \
            -dname "CN=WidgetKit, OU=Dev, O=WidgetKit, L=Unknown, ST=Unknown, C=IN"

      - name: Print base64 keystore
        run: |
          echo "============================================="
          echo "COPY THE BELOW AS GITHUB SECRET: SIGNING_KEYSTORE"
          echo "============================================="
          base64 -w0 widgetkit-release.keystore
          echo ""
          echo "============================================="
          echo ""
          echo "Also add these secrets:"
          echo "  KEYSTORE_PASSWORD = widgetkit2025"
          echo "  KEY_ALIAS         = widgetkit"
          echo "  KEY_PASSWORD      = widgetkit2025"
          echo "============================================="

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: widgetkit-release-keystore
          path: widgetkit-release.keystore
          retention-days: 1
