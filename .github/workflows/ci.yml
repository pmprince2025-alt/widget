name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint check
        run: ./gradlew lint

      - name: Unit tests
        run: ./gradlew test

      - name: Setup signing keystore
        run: |
          mkdir -p "$HOME/.android"
          if [ -n "${{ secrets.SIGNING_KEYSTORE }}" ]; then
            echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > "$HOME/.android/signing.keystore"
          else
            keytool -genkey -v -keystore "$HOME/.android/signing.keystore" \
              -alias widgetkit -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass widgetkit22 -keypass widgetkit22 \
              -dname "CN=WidgetKit,O=WidgetKit,C=US"
            echo "KEYSTORE_BASE64=$(base64 -w0 "$HOME/.android/signing.keystore")" >> "$GITHUB_ENV"
          fi

      - name: Print keystore base64 (first run only)
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "=== SAVE THIS AS GitHub secret SIGNING_KEYSTORE ==="
          echo "$KEYSTORE_BASE64"
          echo "=================================================="

      - name: Build debug APK
        run: ./gradlew assembleDebug -PkeystorePath="$HOME/.android/signing.keystore" -PkeystorePassword=widgetkit22 -PkeyAlias=widgetkit -PkeyPassword=widgetkit22

      - name: Build release APK
        run: ./gradlew assembleRelease -PkeystorePath="$HOME/.android/signing.keystore" -PkeystorePassword=widgetkit22 -PkeyAlias=widgetkit -PkeyPassword=widgetkit22

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
