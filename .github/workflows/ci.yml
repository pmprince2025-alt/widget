name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint check
        run: ./gradlew lint

      - name: Unit tests
        run: ./gradlew test

      - name: Decode signing keystore
        run: |
          mkdir -p "$HOME/.android"
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > "$HOME/.android/signing.keystore"

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug \
            -PkeystorePath="$HOME/.android/signing.keystore" \
            -PkeystorePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PkeyAlias="${{ secrets.KEY_ALIAS }}" \
            -PkeyPassword="${{ secrets.KEY_PASSWORD }}"

      - name: Build release APK
        run: |
          ./gradlew assembleRelease \
            -PkeystorePath="$HOME/.android/signing.keystore" \
            -PkeystorePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PkeyAlias="${{ secrets.KEY_ALIAS }}" \
            -PkeyPassword="${{ secrets.KEY_PASSWORD }}"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
